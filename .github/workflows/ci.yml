name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Typecheck + tests + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      # Unit + integration tests (offline: fakes, no GitHub / Anthropic calls).
      - name: Tests
        run: npm test
      # Prove the production build the container runs actually compiles.
      - name: Build
        run: npm run build

  changeset:
    name: Changeset present
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # Require every PR to add a changeset (so its change actually ships in a
      # release), OR opt out explicitly with the `no-changeset` label for
      # version-neutral PRs (docs / CI / chore-only).
      - name: Require a changeset (or the 'no-changeset' label)
        env:
          BASE: ${{ github.base_ref }}
          SKIP: ${{ contains(github.event.pull_request.labels.*.name, 'no-changeset') }}
        run: |
          if [ "$SKIP" = "true" ]; then
            echo "no-changeset label present — skipping the changeset requirement."
            exit 0
          fi
          git fetch --quiet origin "$BASE"
          added="$(git diff --name-only --diff-filter=AM "origin/${BASE}...HEAD" -- '.changeset/*.md' \
            | grep -vE '\.changeset/(README\.md|config\.json)$' || true)"
          if [ -z "$added" ]; then
            echo "::error::No changeset found. Run 'npm run changeset', commit the generated .changeset/*.md and push — or add the 'no-changeset' label if this PR needs no release (docs / CI / chore-only)."
            exit 1
          fi
          echo "Changeset(s) present:"; printf '%s\n' "$added"

  docker-build:
    name: Validate Docker image builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      # Build the amd64 image WITHOUT pushing — CI proof that the Dockerfile is
      # valid on every PR. The multi-arch publish happens in release.yml.
      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: false
          load: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
