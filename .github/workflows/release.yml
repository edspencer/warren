name: Release

# App-mode release pipeline (Warren is an app, not a published npm library):
#   1. On push to main, changesets maintains a "chore: version packages" PR that
#      bumps the app version (package.json) and updates CHANGELOG.md.
#   2. When that PR merges, no changesets remain, the version has changed, and no
#      v<version> tag exists yet → the release jobs build & publish:
#        - the multi-arch Docker image  ghcr.io/edspencer/warren:<version> + :latest
#        - a self-contained release tarball attached to a GitHub Release v<version>
#
# All jobs run in the SAME workflow run (the push that merges the version PR), so
# we never rely on GITHUB_TOKEN pushing a tag to trigger a second workflow (which
# GitHub blocks).

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Version PR / detect release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      should_release: ${{ steps.detect.outputs.should_release }}
      version: ${{ steps.detect.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Opens/updates the "chore: version packages" PR while changesets are
      # present. No `publish:` — Warren is a private app, never npm-published.
      - name: Changesets version PR
        id: changesets
        uses: changesets/action@v1
        with:
          version: npm run changeset:version
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # After a version PR merges there are no changesets left. If the current
      # app version has no v<version> tag yet, this is a fresh release.
      - name: Detect release
        id: detect
        if: steps.changesets.outputs.hasChangesets == 'false'
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          if git rev-parse -q --verify "refs/tags/v${VERSION}" >/dev/null; then
            echo "v${VERSION} already released — nothing to do"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "new release: v${VERSION}"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          fi

  # Build each arch on a NATIVE runner (amd64 on x86, arm64 on GitHub's arm
  # runners) instead of emulating arm64 under QEMU. Each leg pushes by digest;
  # `artifacts` merges the manifest.
  build-image:
    name: Build image (${{ matrix.platform }})
    needs: release
    if: needs.release.outputs.should_release == 'true'
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            arch: amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=ghcr.io/edspencer/warren,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  artifacts:
    name: Publish image + tarball + release
    needs: [release, build-image]
    if: needs.release.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release + tag
      packages: write # push the merged manifest to GHCR
    env:
      VERSION: ${{ needs.release.outputs.version }}
      IMAGE: ghcr.io/edspencer/warren
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build

      # ---- release tarball ----
      - name: Build tarball
        run: bash scripts/make-tarball.sh

      # ---- assemble multi-arch image from per-arch digests ----
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag multi-arch image
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            -t "${IMAGE}:${VERSION}" \
            -t "${IMAGE}:latest" \
            $(printf "${IMAGE}@sha256:%s " *)

      - name: Inspect image
        run: docker buildx imagetools inspect "${IMAGE}:${VERSION}"

      # ---- GitHub Release (creates the v<version> tag at this SHA) ----
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --generate-notes \
            "warren-${VERSION}.tgz" \
            "warren-${VERSION}.tgz.sha256"
